# ==============================================================================
# Knative Service YAML – WordPress Single-Pod (4-container) for Cloud Run
# ==============================================================================
#
# Multi-container sidecars on Cloud Run require ALPHA launch stage.
# Startup ordering: otel-collector must be healthy before nginx/wordpress start.
#                   cloud-sql-proxy must be healthy before wordpress starts.
#
# Before deploying:
#   1. Build and push images:
#        composer docker-build
#        docker push <REGISTRY>/nginx-wordpress:<TAG>
#        docker push <REGISTRY>/php-fpm-wordpress:<TAG>
#   2. Create OTel config secret:
#        gcloud secrets create otel-collector-config \
#          --data-file=deployment/otel-config.yaml \
#          --project=PROJECT_ID
#   3. Grant Cloud Run SA access to the secret:
#        gcloud secrets add-iam-policy-binding otel-collector-config \
#          --member=serviceAccount:SA_EMAIL \
#          --role=roles/secretmanager.secretAccessor \
#          --project=PROJECT_ID
#   4. Deploy:
#        composer knative-deploy
#
# Replace <REGISTRY>, <TAG>, PROJECT_ID, CLOUD_SQL_INSTANCE, SERVICE_ACCOUNT
# with real values (or use substitution variables in Cloud Build / gcloud CLI).
# ==============================================================================

apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: wordpress
  annotations:
    # Multi-container sidecars require Alpha launch stage on Cloud Run.
    run.googleapis.com/launch-stage: ALPHA

spec:
  template:
    metadata:
      annotations:
        # ---------- Execution environment ----------------------------------
        run.googleapis.com/execution-environment: gen2

        # ---------- Startup ordering ---------------------------------------
        # nginx and wordpress may only start after otel-collector is healthy.
        # wordpress additionally waits for cloud-sql-proxy to be healthy.
        run.googleapis.com/container-dependencies: >-
          {
            "nginx":     ["otel-collector"],
            "wordpress": ["otel-collector", "cloud-sql-proxy"]
          }

        # ---------- Secret bindings ----------------------------------------
        # OTel collector config is stored in Secret Manager.
        # Format: VOLUME_NAME:projects/PROJECT_ID/secrets/SECRET_NAME
        run.googleapis.com/secrets: >-
          otel-config:projects/PROJECT_ID/secrets/otel-collector-config

        # ---------- Scaling ------------------------------------------------
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"

    spec:
      # Cloud Run service account with roles:
      #   - roles/cloudsql.client
      #   - roles/secretmanager.secretAccessor
      #   - roles/logging.logWriter
      #   - roles/monitoring.metricWriter
      #   - roles/cloudtrace.agent
      serviceAccountName: SERVICE_ACCOUNT@PROJECT_ID.iam.gserviceaccount.com

      # Pod-level timeout (must be ≥ request_terminate_timeout in php-fpm)
      timeoutSeconds: 60

      containers:
        # -----------------------------------------------------------------------
        # nginx – HTTP ingress + static file serving
        # The container with `ports` is the one Cloud Run routes HTTP traffic to.
        # -----------------------------------------------------------------------
        - name: nginx
          image: <REGISTRY>/nginx-wordpress:<TAG>
          ports:
            - name: http1
              containerPort: 8080

          env:
            - name: NGINX_PORT
              value: "8080"
            - name: NGINX_HEALTH_PORT
              value: "8081"
            - name: NGINX_BACKEND_HOST
              value: "127.0.0.1:9000"
            - name: NGINX_ENABLE_OTEL
              value: "true"
            - name: NGINX_OTEL_ENDPOINT
              value: "127.0.0.1:4317"
            - name: NGINX_OTEL_SERVICE_NAME
              value: "wordpress"

          volumeMounts:
            - name: run-data
              mountPath: /var/run

          livenessProbe:
            httpGet:
              path: /nginx_status
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

        # -----------------------------------------------------------------------
        # wordpress – PHP-FPM application (Bedrock WordPress)
        # Communicates with nginx via TCP 127.0.0.1:9000.
        # Health API (health-server): 127.0.0.1:8082
        # -----------------------------------------------------------------------
        - name: wordpress
          image: <REGISTRY>/php-fpm-wordpress:<TAG>

          env:
            # PHP runtime
            - name: MEM_LIMIT
              value: "256M"
            - name: POST_MAX_SIZE
              value: "64M"
            - name: UPLOAD_MAX_FILE_SIZE
              value: "64M"
            - name: MAX_INPUT_TIME
              value: "30"
            - name: MAX_EXECUTION_TIME
              value: "30"
            - name: MAX_FILE_UPLOADS
              value: "20"
            # PHP-FPM pool
            - name: PM
              value: "static"
            - name: PM_MAX_CHILDREN
              value: "5"
            - name: REQUEST_TERMINATE_TIMEOUT
              value: "35s"
            - name: PM_STATUS_LISTEN
              value: "9001"
            # OpenTelemetry (PHP SDK standard env vars)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://127.0.0.1:4317"
            - name: OTEL_SERVICE_NAME
              value: "wordpress"
            # Cloud SQL via unix socket – DB_HOST must match the socket path
            - name: DB_HOST
              value: "/cloudsql/CLOUD_SQL_INSTANCE" # Replace CLOUD_SQL_INSTANCE

          volumeMounts:
            - name: run-data
              mountPath: /var/run
            - name: cloudsql-sockets
              mountPath: /cloudsql

          startupProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12 # 60s total start window

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 750m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 768Mi

        # -----------------------------------------------------------------------
        # cloud-sql-proxy – Secure MySQL tunnel for Cloud SQL (IAM auth, Unix socket)
        # --enable-iam-login : Cloud Run SA becomes the DB user (no password needed)
        # --lazy-refresh     : defers IAM token refresh until first connection
        # --unix-socket      : socket at /cloudsql/PROJECT:REGION:INSTANCE
        # --http-address/port: built-in health check HTTP server on :9090
        # -----------------------------------------------------------------------
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          env:
            - name: CSQL_PROXY_AUTO_IAM_AUTHN
              value: "true"
            - name: CSQL_PROXY_LAZY_REFRESH
              value: "true"
            - name: CSQL_PROXY_MAX_CONNECTIONS
              value: "5"
            - name: CSQL_PROXY_UNIX_SOCKET
              value: "/cloudsql"
            - name: CSQL_PROXY_HTTP_ADDRESS
              value: "0.0.0.0"
            - name: CSQL_PROXY_HTTP_PORT
              value: "9090"
            - name: CSQL_PROXY_INSTANCE_CONNECTION_NAME_0
              value: "CLOUD_SQL_INSTANCE" # Replace: project:region:instance

          volumeMounts:
            - name: cloudsql-sockets
              mountPath: /cloudsql

          startupProbe:
            httpGet:
              path: /readiness
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6 # 30s total

          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        # -----------------------------------------------------------------------
        # otel-collector – Google-Built OpenTelemetry Collector
        # Exposes OTLP gRPC :4317, OTLP HTTP :4318 on loopback.
        # Health check endpoint: http://:13133/ (required by Cloud Run).
        # Config is loaded from Secret Manager volume.
        # -----------------------------------------------------------------------
        - name: otel-collector
          image: us-docker.pkg.dev/cloud-ops-agents-artifacts/google-cloud-opentelemetry-collector/otelcol-google:0.148.0

          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol-google/

          startupProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6 # 30s total start window

          livenessProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

      volumes:
        # Shared /var/run for Unix-socket communication (nginx ↔ php-fpm)
        - name: run-data
          emptyDir: {}

        # Shared directory for Cloud SQL unix socket files
        - name: cloudsql-sockets
          emptyDir: {}

        # OTel config from Secret Manager (created before first deploy)
        - name: otel-config
          secret:
            secretName: otel-collector-config
            items:
              - key: latest
                path: config.yaml
